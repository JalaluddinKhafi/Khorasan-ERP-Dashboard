<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>گالری تصاویر | مدیریت جامع</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../assets/css/style.css">
    <style>
        .gallery-filter {
            display: flex;
            justify-content: center;
            gap: 1rem;
            margin-bottom: 2rem;
            flex-wrap: wrap;
        }
        .filter-btn {
            padding: 0.5rem 1.5rem;
            border-radius: 2rem;
            border: none;
            background: #f1f5f9;
            transition: 0.3s;
        }
        .filter-btn.active, .filter-btn:hover {
            background: #2563eb;
            color: white;
        }
        .gallery-item {
            position: relative;
            overflow: hidden;
            border-radius: 1rem;
            cursor: pointer;
            margin-bottom: 1.5rem;
        }
        .gallery-item img {
            width: 100%;
            height: 250px;
            object-fit: cover;
            transition: 0.5s;
        }
        .gallery-item:hover img {
            transform: scale(1.1);
        }
        .gallery-overlay {
            position: absolute;
            bottom: -100%;
            left: 0;
            right: 0;
            background: linear-gradient(to top, rgba(0,0,0,0.8), transparent);
            color: white;
            padding: 1rem;
            transition: 0.3s;
        }
        .gallery-item:hover .gallery-overlay {
            bottom: 0;
        }
        /* Lightbox */
        .lightbox {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            z-index: 9999;
            justify-content: center;
            align-items: center;
        }
        .lightbox.active {
            display: flex;
        }
        .lightbox img {
            max-width: 90%;
            max-height: 90%;
            border-radius: 1rem;
        }
        .lightbox-close {
            position: absolute;
            top: 20px;
            left: 30px;
            color: white;
            font-size: 2rem;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm sticky-top">
        <div class="container">
            <a class="navbar-brand fw-bold" href="index.html">
                <i class="fas fa-chart-line text-primary"></i> مدیریت جامع
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto mb-2 mb-lg-0">
                    <li class="nav-item"><a class="nav-link" href="index.html">صفحه نخست</a></li>
                    <li class="nav-item"><a class="nav-link" href="about.html">درباره ما</a></li>
                    <li class="nav-item"><a class="nav-link" href="products.html">محصولات</a></li>
                    <li class="nav-item"><a class="nav-link" href="services.html">خدمات</a></li>
                    <li class="nav-item"><a class="nav-link" href="blog.html">وبلاگ</a></li>
                    <li class="nav-item"><a class="nav-link active" href="gallery.html">گالری</a></li>
                    <li class="nav-item"><a class="nav-link" href="contact.html">تماس با ما</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <section class="bg-primary text-white py-5">
        <div class="container text-center">
            <h1 class="display-4 fw-bold">گالری تصاویر</h1>
            <p class="lead">تصاویر محصولات، رویدادها و فعالیت‌های شرکت</p>
        </div>
    </section>

    <div class="container py-5">
        <div class="gallery-filter">
            <button class="filter-btn active" data-filter="all">همه</button>
            <button class="filter-btn" data-filter="products">محصولات</button>
            <button class="filter-btn" data-filter="events">رویدادها</button>
            <button class="filter-btn" data-filter="office">دفتر شرکت</button>
        </div>
        
        <div class="row" id="galleryGrid">
            <!-- توسط JS پر می‌شود -->
        </div>
    </div>

    <!-- Lightbox -->
    <div class="lightbox" id="lightbox">
        <span class="lightbox-close">&times;</span>
        <img id="lightboxImg" src="" alt="">
    </div>

    <footer class="bg-dark text-white-50 py-4 mt-5">
        <div class="container text-center">
            <p>&copy; ۱۴۰۲ تمامی حقوق محفوظ است.</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const galleryItems = [
            { id: 1, category: "products", title: "لپ تاپ ایسوس ROG", image: "https://via.placeholder.com/400x300/2563eb/white?text=ASUS+ROG" },
            { id: 2, category: "products", title: "گوشی سامسونگ S24", image: "https://via.placeholder.com/400x300/10b981/white?text=Samsung+S24" },
            { id: 3, category: "products", title: "هدفون سونی XM5", image: "https://via.placeholder.com/400x300/f59e0b/white?text=Sony+XM5" },
            { id: 4, category: "events", title: "همایش سالانه ۱۴۰۲", image: "https://via.placeholder.com/400x300/ef4444/white?text=Event+2024" },
            { id: 5, category: "events", title: "کارگاه آموزشی مدیریت فروش", image: "https://via.placeholder.com/400x300/8b5cf6/white?text=Workshop" },
            { id: 6, category: "office", title: "دفتر مرکزی تهران", image: "https://via.placeholder.com/400x300/06b6d4/white?text=Office" },
            { id: 7, category: "office", title: "تیم پشتیبانی", image: "https://via.placeholder.com/400x300/14b8a6/white?text=Support+Team" },
            { id: 8, category: "products", title: "تبلت اپل iPad Pro", image: "https://via.placeholder.com/400x300/3b82f6/white?text=iPad+Pro" }
        ];
        
        let currentFilter = "all";
        
        function renderGallery() {
            const filtered = currentFilter === "all" ? galleryItems : galleryItems.filter(item => item.category === currentFilter);
            const grid = document.getElementById('galleryGrid');
            
            grid.innerHTML = filtered.map(item => `
                <div class="col-md-4 col-sm-6">
                    <div class="gallery-item" data-id="${item.id}">
                        <img src="${item.image}" alt="${item.title}">
                        <div class="gallery-overlay">
                            <h6 class="mb-0">${item.title}</h6>
                        </div>
                    </div>
                </div>
            `).join('');
            
            // رویداد کلیک برای لایت‌باکس
            document.querySelectorAll('.gallery-item').forEach((item, index) => {
                item.addEventListener('click', () => {
                    const img = item.querySelector('img').src;
                    document.getElementById('lightboxImg').src = img;
                    document.getElementById('lightbox').classList.add('active');
                });
            });
        }
        
        // فیلترها
        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentFilter = btn.dataset.filter;
                renderGallery();
            });
        });
        
        // لایت‌باکس بستن
        document.querySelector('.lightbox-close')?.addEventListener('click', () => {
            document.getElementById('lightbox').classList.remove('active');
        });
        document.getElementById('lightbox')?.addEventListener('click', (e) => {
            if (e.target === document.getElementById('lightbox')) {
                document.getElementById('lightbox').classList.remove('active');
            }
        });
        
        renderGallery();
    </script>
</body>
</html>
