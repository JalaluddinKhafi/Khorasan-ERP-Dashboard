<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مدیریت مشتریان | داشبورد</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.datatables.net/1.13.4/css/dataTables.bootstrap5.min.css">
    <link rel="stylesheet" href="../assets/css/style.css">
</head>
<body>
    <div class="wrapper">
        <aside id="sidebar" class="sidebar"></aside>
        <main class="main-content">
            <nav class="top-navbar"></nav>
            <div class="container-fluid p-4">
                <div class="card">
                    <div class="card-header d-flex justify-content-between">
                        <h5>لیست مشتریان</h5>
                        <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#customerModal">
                            <i class="fas fa-plus"></i> افزودن مشتری
                        </button>
                    </div>
                    <div class="card-body">
                        <div class="row mb-3">
                            <div class="col-md-4">
                                <input type="text" id="searchCustomer" class="form-control" placeholder="جستجوی مشتری...">
                            </div>
                            <div class="col-md-3">
                                <select id="customerTypeFilter" class="form-select">
                                    <option value="all">همه مشتریان</option>
                                    <option value="حقیقی">حقیقی</option>
                                    <option value="حقوقی">حقوقی</option>
                                </select>
                            </div>
                        </div>
                        <table id="customersTable" class="table table-striped">
                            <thead>
                                <tr><th>کد</th><th>نام مشتری</th><th>نوع</th><th>شماره تماس</th><th>ایمیل</th><th>بدهی جاری</th><th>تعداد خرید</th><th>عملیات</th></tr>
                            </thead>
                            <tbody id="customersTableBody"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Modal مشتری -->
    <div class="modal fade" id="customerModal" tabindex="-1">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">افزودن/ویرایش مشتری</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="customerForm">
                        <input type="hidden" id="customerId">
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label>نام مشتری</label>
                                <input type="text" id="customerName" class="form-control" required>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label>نوع مشتری</label>
                                <select id="customerType" class="form-select">
                                    <option value="حقیقی">حقیقی</option>
                                    <option value="حقوقی">حقوقی</option>
                                </select>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label>شماره تماس</label>
                                <input type="tel" id="customerPhone" class="form-control" required>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label>ایمیل</label>
                                <input type="email" id="customerEmail" class="form-control">
                            </div>
                            <div class="col-md-12 mb-3">
                                <label>آدرس</label>
                                <textarea id="customerAddress" class="form-control" rows="2"></textarea>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label>کد ملی/شناسه ملی</label>
                                <input type="text" id="customerNationalId" class="form-control">
                            </div>
                            <div class="col-md-6 mb-3">
                                <label>سقف اعتبار (تومان)</label>
                                <input type="number" id="customerCreditLimit" class="form-control" value="0">
                            </div>
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">انصراف</button>
                    <button type="button" class="btn btn-primary" id="saveCustomerBtn">ذخیره</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal جزئیات مشتری -->
    <div class="modal fade" id="customerDetailsModal" tabindex="-1">
        <div class="modal-dialog modal-xl">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">جزئیات مشتری و تاریخچه خرید/پرداخت</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <div id="customerDetails"></div>
                    <ul class="nav nav-tabs mt-4" id="customerTabs">
                        <li class="nav-item"><button class="nav-link active" data-bs-toggle="tab" data-bs-target="#purchaseHistory">تاریخچه خرید</button></li>
                        <li class="nav-item"><button class="nav-link" data-bs-toggle="tab" data-bs-target="#paymentHistory">تاریخچه پرداخت</button></li>
                    </ul>
                    <div class="tab-content mt-3">
                        <div class="tab-pane fade show active" id="purchaseHistory">
                            <table class="table table-sm" id="purchaseHistoryTable">
                                <thead><tr><th>تاریخ</th><th>شماره فاکتور</th><th>مبلغ کل</th><th>وضعیت</th></thead>
                                <tbody id="purchaseHistoryBody"></tbody>
                            </table>
                        </div>
                        <div class="tab-pane fade" id="paymentHistory">
                            <table class="table table-sm" id="paymentHistoryTable">
                                <thead><tr><th>تاریخ</th><th>مبلغ پرداختی</th><th>روش پرداخت</th><th>شماره پیگیری</th></thead>
                                <tbody id="paymentHistoryBody"></tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.datatables.net/1.13.4/js/jquery.dataTables.min.js"></script>
    <script src="../assets/js/utils.js"></script>
    <script src="../assets/js/components.js"></script>
    <script>
        let customersData = [];
        let customersTable = null;
        let currentCustomerId = null;
        
        function loadCustomers() {
            customersData = [
                { id: 1, code: "C-1001", name: "آرمان پوراحمد", type: "حقیقی", phone: "۰۹۱۲۱۲۳۴۵۶۷", email: "arman@gmail.com", address: "تهران، خیابان انقلاب", nationalId: "۱۲۳۴۵۶۷۸۹۰", creditLimit: 50000000, debt: 12500000, totalPurchases: 3 },
                { id: 2, code: "C-1002", name: "شرکت تدبیر", type: "حقوقی", phone: "۰۲۱-۸۸۷۷۶۶۵۵", email: "info@tadbir.com", address: "تهران، خیابان ولیعصر", nationalId: "۱۰۱۰۱۲۳۴۵۶۷", creditLimit: 200000000, debt: 33600000, totalPurchases: 8 },
                { id: 3, code: "C-1003", name: "مهدی رضایی", type: "حقیقی", phone: "۰۹۳۵۵۴۴۳۳۲۲", email: "mahdi@yahoo.com", address: "اصفهان، خیابان سپاه", nationalId: "۲۳۴۵۶۷۸۹۰۱", creditLimit: 20000000, debt: 0, totalPurchases: 1 },
                { id: 4, code: "C-1004", name: "فروشگاه دیجیتال", type: "حقوقی", phone: "۰۲۱-۵۵۴۴۳۳۲۱", email: "shop@digital.com", address: "مشهد، خیابان احمدآباد", nationalId: "۱۰۱۰۹۸۷۶۵۴۳", creditLimit: 150000000, debt: 45200000, totalPurchases: 12 }
            ];
            renderCustomersTable();
        }
        
        function renderCustomersTable() {
            const tbody = document.getElementById('customersTableBody');
            if (!tbody) return;
            
            tbody.innerHTML = customersData.map(c => `
                <tr>
                    <td>${c.code}</td>
                    <td>${c.name}</td>
                    <td><span class="badge ${c.type === 'حقوقی' ? 'bg-info' : 'bg-success'}">${c.type}</span></td>
                    <td>${c.phone}</td>
                    <td>${c.email}</td>
                    <td class="${c.debt > 0 ? 'text-danger fw-bold' : 'text-success'}">${c.debt.toLocaleString()} تومان</td>
                    <td>${c.totalPurchases}</td>
                    <td>
                        <button class="btn btn-sm btn-info edit-customer" data-id="${c.id}"><i class="fas fa-edit"></i></button>
                        <button class="btn btn-sm btn-primary view-customer-details" data-id="${c.id}"><i class="fas fa-eye"></i></button>
                        <button class="btn btn-sm btn-danger delete-customer" data-id="${c.id}"><i class="fas fa-trash"></i></button>
                    </td>
                </tr>
            `).join('');
            
            if (customersTable) customersTable.destroy();
            customersTable = $('#customersTable').DataTable({
                language: { url: "//cdn.datatables.net/plug-ins/1.13.4/i18n/fa.json" },
                pageLength: 10,
                searching: false
            });
            
            attachCustomerEvents();
            setupFilters();
        }
        
        function attachCustomerEvents() {
            document.querySelectorAll('.edit-customer').forEach(btn => {
                btn.addEventListener('click', () => editCustomer(parseInt(btn.dataset.id)));
            });
            document.querySelectorAll('.view-customer-details').forEach(btn => {
                btn.addEventListener('click', () => viewCustomerDetails(parseInt(btn.dataset.id)));
            });
            document.querySelectorAll('.delete-customer').forEach(btn => {
                btn.addEventListener('click', () => deleteCustomer(parseInt(btn.dataset.id)));
            });
        }
        
        function setupFilters() {
            const searchInput = document.getElementById('searchCustomer');
            const typeFilter = document.getElementById('customerTypeFilter');
            
            if (searchInput) {
                searchInput.addEventListener('keyup', () => filterCustomers());
            }
            if (typeFilter) {
                typeFilter.addEventListener('change', () => filterCustomers());
            }
        }
        
        function filterCustomers() {
            const searchTerm = document.getElementById('searchCustomer')?.value.toLowerCase() || '';
            const type = document.getElementById('customerTypeFilter')?.value || 'all';
            
            const filtered = customersData.filter(c => {
                const matchSearch = c.name.toLowerCase().includes(searchTerm) || c.phone.includes(searchTerm);
                const matchType = type === 'all' || c.type === type;
                return matchSearch && matchType;
            });
            
            const tbody = document.getElementById('customersTableBody');
            if (tbody) {
                tbody.innerHTML = filtered.map(c => `
                    <tr>
                        <td>${c.code}</td>
                        <td>${c.name}</td>
                        <td><span class="badge ${c.type === 'حقوقی' ? 'bg-info' : 'bg-success'}">${c.type}</span></td>
                        <td>${c.phone}</td>
                        <td>${c.email}</td>
                        <td class="${c.debt > 0 ? 'text-danger fw-bold' : 'text-success'}">${c.debt.toLocaleString()} تومان</td>
                        <td>${c.totalPurchases}</td>
                        <td>
                            <button class="btn btn-sm btn-info edit-customer" data-id="${c.id}"><i class="fas fa-edit"></i></button>
                            <button class="btn btn-sm btn-primary view-customer-details" data-id="${c.id}"><i class="fas fa-eye"></i></button>
                            <button class="btn btn-sm btn-danger delete-customer" data-id="${c.id}"><i class="fas fa-trash"></i></button>
                        </td>
                    </tr>
                `).join('');
                attachCustomerEvents();
            }
        }
        
        function editCustomer(id) {
            const customer = customersData.find(c => c.id === id);
            if (!customer) return;
            
            currentCustomerId = id;
            document.getElementById('customerId').value = customer.id;
            document.getElementById('customerName').value = customer.name;
            document.getElementById('customerType').value = customer.type;
            document.getElementById('customerPhone').value = customer.phone;
            document.getElementById('customerEmail').value = customer.email;
            document.getElementById('customerAddress').value = customer.address || '';
            document.getElementById('customerNationalId').value = customer.nationalId;
            document.getElementById('customerCreditLimit').value = customer.creditLimit;
            
            new bootstrap.Modal(document.getElementById('customerModal')).show();
        }
        
        function viewCustomerDetails(id) {
            const customer = customersData.find(c => c.id === id);
            if (!customer) return;
            
            // نمونه داده‌های تاریخچه خرید و پرداخت
            const purchaseHistory = [
                { date: "۱۴۰۲/۱۲/۰۵", invoiceNo: "S-1001", amount: 12500000, status: "پرداخت شده" },
                { date: "۱۴۰۲/۱۱/۲۰", invoiceNo: "S-0988", amount: 8900000, status: "پرداخت شده" },
                { date: "۱۴۰۲/۱۰/۱۵", invoiceNo: "S-0955", amount: 33600000, status: "در انتظار پرداخت" }
            ];
            
            const paymentHistory = [
                { date: "۱۴۰۲/۱۲/۰۱", amount: 5000000, method: "کارت به کارت", tracking: "TRX123456" },
                { date: "۱۴۰۲/۱۱/۲۵", amount: 10000000, method: "واریز بانکی", tracking: "BNK789012" }
            ];
            
            document.getElementById('customerDetails').innerHTML = `
                <div class="row">
                    <div class="col-md-4">
                        <p><strong>نام مشتری:</strong> ${customer.name}</p>
                        <p><strong>نوع:</strong> ${customer.type}</p>
                    </div>
                    <div class="col-md-4">
                        <p><strong>شماره تماس:</strong> ${customer.phone}</p>
                        <p><strong>ایمیل:</strong> ${customer.email}</p>
                    </div>
                    <div class="col-md-4">
                        <p><strong>بدهی جاری:</strong> <span class="text-danger">${customer.debt.toLocaleString()} تومان</span></p>
                        <p><strong>سقف اعتبار:</strong> ${customer.creditLimit.toLocaleString()} تومان</p>
                    </div>
                </div>
                <div class="row">
                    <div class="col-12">
                        <p><strong>آدرس:</strong> ${customer.address || '---'}</p>
                    </div>
                </div>
            `;
            
            const purchaseBody = document.getElementById('purchaseHistoryBody');
            if (purchaseBody) {
                purchaseBody.innerHTML = purchaseHistory.map(p => `
                    <tr>
                        <td>${p.date}</td>
                        <td>${p.invoiceNo}</td>
                        <td>${p.amount.toLocaleString()} تومان</td>
                        <td><span class="badge ${p.status === 'پرداخت شده' ? 'bg-success' : 'bg-warning'}">${p.status}</span></td>
                    </tr>
                `).join('');
            }
            
            const paymentBody = document.getElementById('paymentHistoryBody');
            if (paymentBody) {
                paymentBody.innerHTML = paymentHistory.map(p => `
                    <tr>
                        <td>${p.date}</td>
                        <td>${p.amount.toLocaleString()} تومان</td>
                        <td>${p.method}</td>
                        <td>${p.tracking}</td>
                    </tr>
                `).join('');
            }
            
            new bootstrap.Modal(document.getElementById('customerDetailsModal')).show();
        }
        
        function saveCustomer() {
            const id = document.getElementById('customerId').value;
            
            const customer = {
                id: id ? parseInt(id) : Date.now(),
                code: id ? customersData.find(c => c.id === parseInt(id))?.code : `C-${Date.now()}`,
                name: document.getElementById('customerName').value,
                type: document.getElementById('customerType').value,
                phone: document.getElementById('customerPhone').value,
                email: document.getElementById('customerEmail').value,
                address: document.getElementById('customerAddress').value,
                nationalId: document.getElementById('customerNationalId').value,
                creditLimit: parseInt(document.getElementById('customerCreditLimit').value) || 0,
                debt: id ? customersData.find(c => c.id === parseInt(id))?.debt || 0 : 0,
                totalPurchases: id ? customersData.find(c => c.id === parseInt(id))?.totalPurchases || 0 : 0
            };
            
            if (id) {
                const index = customersData.findIndex(c => c.id === parseInt(id));
                if (index !== -1) {
                    customersData[index] = { ...customersData[index], ...customer };
                }
                showToast('مشتری با موفقیت ویرایش شد', 'success');
            } else {
                customersData.push(customer);
                showToast('مشتری با موفقیت اضافه شد', 'success');
            }
            
            renderCustomersTable();
            bootstrap.Modal.getInstance(document.getElementById('customerModal')).hide();
            resetCustomerForm();
        }
        
        function resetCustomerForm() {
            document.getElementById('customerId').value = '';
            document.getElementById('customerForm').reset();
            document.getElementById('customerCreditLimit').value = '0';
            currentCustomerId = null;
        }
        
        function deleteCustomer(id) {
            const customer = customersData.find(c => c.id === id);
            if (confirm(`آیا از حذف مشتری "${customer?.name}" اطمینان دارید؟`)) {
                customersData = customersData.filter(c => c.id !== id);
                renderCustomersTable();
                showToast('مشتری با موفقیت حذف شد', 'success');
            }
        }
        
        document.getElementById('saveCustomerBtn')?.addEventListener('click', saveCustomer);
        
        loadSidebarAndNavbar('customers');
        loadCustomers();
    </script>
</body>
</html>
