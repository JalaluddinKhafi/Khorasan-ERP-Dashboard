<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مدیریت کاربران | داشبورد</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.datatables.net/1.13.4/css/dataTables.bootstrap5.min.css">
    <link rel="stylesheet" href="../assets/css/style.css">
</head>
<body>
    <div class="wrapper">
        <aside id="sidebar" class="sidebar"></aside>
        <main class="main-content">
            <nav class="top-navbar"></nav>
            <div class="container-fluid p-4">
                <div class="card">
                    <div class="card-header d-flex justify-content-between">
                        <h5>لیست کاربران سیستم</h5>
                        <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#userModal">
                            <i class="fas fa-plus"></i> افزودن کاربر جدید
                        </button>
                    </div>
                    <div class="card-body">
                        <table id="usersTable" class="table table-striped">
                            <thead>
                                <tr><th>شناسه</th><th>نام کاربری</th><th>نام و نام خانوادگی</th><th>نقش</th><th>ایمیل</th><th>وضعیت</th><th>آخرین ورود</th><th>عملیات</th></tr>
                            </thead>
                            <tbody id="usersTableBody"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Modal کاربر -->
    <div class="modal fade" id="userModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">افزودن/ویرایش کاربر</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="userForm">
                        <input type="hidden" id="userId">
                        <div class="mb-3">
                            <label>نام کاربری</label>
                            <input type="text" id="username" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label>نام و نام خانوادگی</label>
                            <input type="text" id="fullname" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label>ایمیل</label>
                            <input type="email" id="email" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label>شماره تماس</label>
                            <input type="tel" id="phone" class="form-control">
                        </div>
                        <div class="mb-3">
                            <label>نقش کاربری</label>
                            <select id="role" class="form-select" required>
                                <option value="مدیر سیستم">مدیر سیستم</option>
                                <option value="کارمند">کارمند</option>
                                <option value="ناظر">ناظر</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label>رمز عبور</label>
                            <input type="password" id="password" class="form-control" placeholder="در صورت ویرایش خالی بگذارید">
                        </div>
                        <div class="mb-3">
                            <label>وضعیت</label>
                            <select id="status" class="form-select">
                                <option value="فعال">فعال</option>
                                <option value="غیرفعال">غیرفعال</option>
                                <option value="مسدود">مسدود</option>
                            </select>
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">انصراف</button>
                    <button type="button" class="btn btn-primary" id="saveUserBtn">ذخیره</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal حذف -->
    <div class="modal fade" id="deleteModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">تایید حذف کاربر</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    آیا از حذف این کاربر اطمینان دارید؟
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">انصراف</button>
                    <button type="button" class="btn btn-danger" id="confirmDeleteUserBtn">حذف</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.datatables.net/1.13.4/js/jquery.dataTables.min.js"></script>
    <script src="../assets/js/utils.js"></script>
    <script src="../assets/js/components.js"></script>
    <script>
        let usersData = [];
        let usersTable = null;
        let deleteUserId = null;
        
        function loadUsers() {
            usersData = [
                { id: 1, username: "admin", fullname: "مدیر سیستم", email: "admin@company.com", phone: "۰۹۱۲۱۲۳۴۵۶۷", role: "مدیر سیستم", status: "فعال", lastLogin: "۱۴۰۲/۱۲/۰۵ ۱۴:۳۰" },
                { id: 2, username: "reza_ahmadi", fullname: "رضا احمدی", email: "reza@company.com", phone: "۰۹۱۲۲۳۳۴۴۵۵", role: "کارمند", status: "فعال", lastLogin: "۱۴۰۲/۱۲/۰۴ ۱۰:۱۵" },
                { id: 3, username: "sara_karimi", fullname: "سارا کریمی", email: "sara@company.com", phone: "۰۹۳۵۵۴۴۳۳۲۲", role: "ناظر", status: "فعال", lastLogin: "۱۴۰۲/۱۲/۰۵ ۰۹:۰۰" },
                { id: 4, username: "mohammad_h", fullname: "محمد حسینی", email: "mohammad@company.com", phone: "۰۹۰۱۲۳۴۵۶۷۸", role: "کارمند", status: "غیرفعال", lastLogin: "۱۴۰۲/۱۱/۲۸ ۱۶:۲۰" }
            ];
            renderUsersTable();
        }
        
        function renderUsersTable() {
            const tbody = document.getElementById('usersTableBody');
            if (!tbody) return;
            
            tbody.innerHTML = usersData.map(u => `
                <tr>
                    <td>${u.id}</td>
                    <td>${u.username}</td>
                    <td>${u.fullname}</td>
                    <td><span class="badge ${u.role === 'مدیر سیستم' ? 'bg-danger' : (u.role === 'ناظر' ? 'bg-warning' : 'bg-info')}">${u.role}</span></td>
                    <td>${u.email}</td>
                    <td><span class="badge ${u.status === 'فعال' ? 'bg-success' : 'bg-secondary'}">${u.status}</span></td>
                    <td>${u.lastLogin}</td>
                    <td>
                        <button class="btn btn-sm btn-info edit-user" data-id="${u.id}"><i class="fas fa-edit"></i></button>
                        <button class="btn btn-sm btn-danger delete-user" data-id="${u.id}"><i class="fas fa-trash"></i></button>
                     </td>
                </tr>
            `).join('');
            
            if (usersTable) usersTable.destroy();
            usersTable = $('#usersTable').DataTable({
                language: { url: "//cdn.datatables.net/plug-ins/1.13.4/i18n/fa.json" },
                pageLength: 10
            });
            
            attachUserEvents();
        }
        
        function attachUserEvents() {
            document.querySelectorAll('.edit-user').forEach(btn => {
                btn.addEventListener('click', () => editUser(parseInt(btn.dataset.id)));
            });
            document.querySelectorAll('.delete-user').forEach(btn => {
                btn.addEventListener('click', () => showDeleteUserModal(parseInt(btn.dataset.id)));
            });
        }
        
        function editUser(id) {
            const user = usersData.find(u => u.id === id);
            if (!user) return;
            
            document.getElementById('userId').value = user.id;
            document.getElementById('username').value = user.username;
            document.getElementById('fullname').value = user.fullname;
            document.getElementById('email').value = user.email;
            document.getElementById('phone').value = user.phone;
            document.getElementById('role').value = user.role;
            document.getElementById('status').value = user.status;
            document.getElementById('password').value = '';
            
            new bootstrap.Modal(document.getElementById('userModal')).show();
        }
        
        function saveUser() {
            const id = document.getElementById('userId').value;
            const password = document.getElementById('password').value;
            
            const user = {
                id: id ? parseInt(id) : Date.now(),
                username: document.getElementById('username').value,
                fullname: document.getElementById('fullname').value,
                email: document.getElementById('email').value,
                phone: document.getElementById('phone').value,
                role: document.getElementById('role').value,
                status: document.getElementById('status').value,
                lastLogin: id ? usersData.find(u => u.id === parseInt(id))?.lastLogin || "---" : "---"
            };
            
            if (id) {
                const index = usersData.findIndex(u => u.id === parseInt(id));
                if (index !== -1) {
                    usersData[index] = { ...usersData[index], ...user };
                    if (password) {
                        showToast('رمز عبور تغییر کرد', 'info');
                    }
                }
                showToast('کاربر با موفقیت ویرایش شد', 'success');
            } else {
                usersData.push(user);
                showToast('کاربر با موفقیت اضافه شد', 'success');
            }
            
            renderUsersTable();
            bootstrap.Modal.getInstance(document.getElementById('userModal')).hide();
            document.getElementById('userForm').reset();
        }
        
        function showDeleteUserModal(id) {
            deleteUserId = id;
            new bootstrap.Modal(document.getElementById('deleteModal')).show();
        }
        
        function confirmDeleteUser() {
            if (deleteUserId) {
                usersData = usersData.filter(u => u.id !== deleteUserId);
                renderUsersTable();
                showToast('کاربر با موفقیت حذف شد', 'success');
                bootstrap.Modal.getInstance(document.getElementById('deleteModal')).hide();
                deleteUserId = null;
            }
        }
        
        document.getElementById('saveUserBtn')?.addEventListener('click', saveUser);
        document.getElementById('confirmDeleteUserBtn')?.addEventListener('click', confirmDeleteUser);
        
        loadSidebarAndNavbar('users');
        loadUsers();
    </script>
</body>
</html>
