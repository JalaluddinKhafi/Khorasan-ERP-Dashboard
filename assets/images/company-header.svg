<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 150" width="800" height="150">
    <defs>
        <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" style="stop-color:#1e293b;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#0f172a;stop-opacity:1" />
        </linearGradient>
        <linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#2563eb;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#1e40af;stop-opacity:1" />
        </linearGradient>
    </defs>
    
    <!-- پس‌زمینه -->
    <rect width="800" height="150" fill="url(#bgGrad)" rx="10"/>
    
    <!-- لوگو (آیکون نمودار) -->
    <circle cx="70" cy="75" r="40" fill="white" opacity="0.1"/>
    <circle cx="70" cy="75" r="35" fill="url(#logoGrad)"/>
    <polyline points="50,90 65,65 80,80 95,55" fill="none" stroke="white" stroke-width="3" stroke-linecap="round"/>
    
    <!-- متن شرکت -->
    <text x="130" y="55" font-family="IRANSans, Tahoma, sans-serif" font-size="22" font-weight="bold" fill="white">
        شرکت مدیریت جامع
    </text>
    <text x="130" y="80" font-family="IRANSans, Tahoma, sans-serif" font-size="12" fill="#94a3b8">
        نمایندگی رسمی | مدیریت فروش، انبار، خرید و مالی
    </text>
    <text x="130" y="100" font-family="IRANSans, Tahoma, sans-serif" font-size="11" fill="#64748b">
        تهران، خیابان ولیعصر، پلاک ۱۲۳ | تلفن: ۰۲۱-۱۲۳۴۵۶۷۸
    </text>
    
    <!-- خط جداکننده -->
    <line x1="120" y1="120" x2="750" y2="120" stroke="#334155" stroke-width="1"/>
    
    <!-- اطلاعات تماس در پایین -->
    <text x="130" y="138" font-family="IRANSans, Tahoma, sans-serif" font-size="10" fill="#64748b">
        info@armanmanagement.com | www.armanmanagement.com | کد پستی: ۱۲۳۴۵۶۷۸۹۰
    </text>
</svg>